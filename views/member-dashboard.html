<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docuflow - Member Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/member-dashboard.css" />
  </head>
  <body class="member-body">
    <header class="member-header">
      <div class="header-left">
        <div class="logo-area">
          <span class="web-logo">Docuflow</span>
        </div>
      </div>
      <div class="header-right">
        <div class="user-info">
          <span class="user-email">member@office.gov</span>
          <span class="user-role">Office Member</span>
        </div>
        <div class="header-actions">
          <button
            id="themeToggle"
            class="icon-btn toggle-theme"
            type="button"
            aria-label="Toggle dark/light mode"
          >
            <i class="fas fa-moon"></i>
          </button>
          <button
            class="icon-btn logout-btn"
            type="button"
            aria-label="Exit / Logout"
          >
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="member-main">
      <section class="stats-row">
        <button class="stat-card" type="button">
          <span class="stat-number">3</span>
          <span class="stat-label">Pending Signed</span>
        </button>
        <button class="stat-card" type="button">
          <span class="stat-number">7</span>
          <span class="stat-label">Signed Today</span>
        </button>
        <button class="stat-card" type="button">
          <span class="stat-number">142</span>
          <span class="stat-label">Total Signed</span>
        </button>
      </section>

      <section class="dashboard-grid">
        <section
          class="panel-card member-chart-panel"
          id="pending-chart-panel"
          style="display: none"
        >
          <div class="panel-header">
            <div>
              <h2 class="section-title">Pending Signed Distribution</h2>
            </div>
          </div>
          <div id="pending-chart-content" class="member-chart-content"></div>
        </section>

        <section class="panel-card documents-panel">
          <div class="panel-header">
            <h2 class="section-title" id="documents-title">Pending Signed</h2>
            <button class="view-all" type="button">View All</button>
          </div>
          <div id="pending-list" class="pending-list"></div>
        </section>
      </section>
    </main>

    <script src="../js/member-dashboard.js"></script>
  </body>
</html>
