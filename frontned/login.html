<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docuflow Login</title>
    <link rel="stylesheet" href="../css/stylelogin.css" />
  </head>
  <body>
    <main class="login-card">
      <div class="top-icons">
        <button
          class="icon-button mode-icon"
          type="button"
          onclick="document.body.classList.toggle('night-mode')"
        >
          <span class="moon-icon">☾</span>
          <span class="sun-icon">☀</span>
        </button>
      </div>

      <div class="brand">
        <h1>Docuflow</h1>
        <p class="subtitle">Document Tracking System</p>
      </div>

      <form>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="your.email@office.gov" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="........" />
        </div>

        <button type="submit">Sign In</button>
      </form>

      <a href="register.html" class="register-link">Register here</a>

      <p class="demo-users">
        Demo users: admin@office.gov, secretary@office.gov, member@office.gov
      </p>
    </main>
  </body>
</html>
